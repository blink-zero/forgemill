# Forgemill — Environment Variable compose example
#
# Simpler alternative to docker-compose.prod.yml for deployments
# that prefer environment variables over Docker secrets files.
#
# Quick start:
#   1. Copy the example env file:
#      cp .env.example .env
#
#   2. Edit .env and fill in your values:
#      - FORGEMILL_JWT_SECRET       (random 32+ char string)
#      - FORGEMILL_ENCRYPTION_KEY   (random 32+ char string)
#      - FORGEMILL_ADMIN_PASSWORD   (strong password, min 12 chars)
#
#   3. Start:
#      docker compose -f docker-compose.env.yml up -d
#
# Generate secure secrets with:
#   openssl rand -base64 32
#
# ⚠️  Never commit your .env file to source control.
#     The .gitignore already excludes it.

services:
  forgemill:
    image: ${FORGEMILL_IMAGE:-ghcr.io/blink-zero/forgemill:latest}
    container_name: forgemill
    ports:
      - "${FORGEMILL_PORT:-8080}:8080"
    volumes:
      - forgemill-data:/app/data
    environment:
      FORGEMILL_JWT_SECRET: ${FORGEMILL_JWT_SECRET}
      FORGEMILL_ENCRYPTION_KEY: ${FORGEMILL_ENCRYPTION_KEY}
      FORGEMILL_ADMIN_USER: ${FORGEMILL_ADMIN_USER:-admin}
      FORGEMILL_ADMIN_PASSWORD: ${FORGEMILL_ADMIN_PASSWORD}
      FORGEMILL_LOG_LEVEL: ${FORGEMILL_LOG_LEVEL:-info}
      FORGEMILL_TLS_CERT: ${FORGEMILL_TLS_CERT:-}
      FORGEMILL_TLS_KEY: ${FORGEMILL_TLS_KEY:-}
      FORGEMILL_TRUSTED_PROXIES: ${FORGEMILL_TRUSTED_PROXIES:-}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/forgemill/.cache:uid=1001,gid=1001
      - /home/forgemill/.config:uid=1001,gid=1001
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  forgemill-data:
